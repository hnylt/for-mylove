<!DOCTYPE html>
<html>
<head>
  <title>For James Carl 💜</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle, #0f0c29, #1a0033, #000000);
      color: white;
      text-align: center;
      overflow-x: hidden;
    }

    /* 🌌 STAR BACKGROUND */
    .stars {
      position: fixed;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      z-index: 0;
    }

    .stars::after {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      background-image: radial-gradient(white 1px, transparent 1px);
      background-size: 50px 50px;
      animation: moveStars 60s linear infinite;
      opacity: 0.3;
    }

    @keyframes moveStars {
      from { transform: translateY(0); }
      to { transform: translateY(-500px); }
    }

    .container {
      position: relative;
      z-index: 2;
      max-width: 700px;
      margin: 60px auto;
      background: rgba(0,0,0,0.75);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 0 25px rgba(147, 51, 234, 0.5);
    }

    h1 {
      color: #c084fc;
      text-shadow: 0 0 10px #a855f7;
    }

    button, input {
      padding: 12px;
      width: 80%;
      margin: 10px;
      border-radius: 10px;
      border: none;
    }

    input {
      background: #1e1e2f;
      color: white;
    }

    button {
      background: #7c3aed;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #a78bfa;
    }

    .hidden {
      display: none;
    }

    /* ❤️ HEART PARTICLES */
    .particle {
      position: fixed;
      color: red;
      font-size: 18px;
      animation: floatUp 6s linear infinite;
      opacity: 0.8;
      z-index: 1;
    }

    @keyframes floatUp {
      from { transform: translateY(100vh); }
      to { transform: translateY(-10vh); }
    }

    /* 📸 SLIDER */
    .slider img {
      width: 100%;
      border-radius: 15px;
      margin-top: 10px;
      opacity: 0;
      animation: fadeIn 2s forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* 💔 SHAKE */
    .shake {
      animation: shake 0.5s;
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      50% { transform: translateX(10px); }
      75% { transform: translateX(-10px); }
      100% { transform: translateX(0); }
    }

    /* 💜 GLOW NAME */
    .glow {
      font-size: 28px;
      color: #fff;
      text-shadow: 0 0 10px #a855f7, 0 0 20px #a855f7;
    }
  </style>
</head>

<body>

<div class="stars"></div>

<script>
  // ❤️ floating hearts
  function createParticle() {
    const el = document.createElement("div");
    el.classList.add("particle");
    el.innerHTML = Math.random() > 0.5 ? "❤️" : "✨";
    el.style.left = Math.random() * 100 + "vw";
    el.style.animationDuration = (Math.random() * 4 + 4) + "s";
    document.body.appendChild(el);

    setTimeout(() => el.remove(), 6000);
  }

  setInterval(createParticle, 300);
</script>

<!-- LOGIN -->
<div class="container" id="loginPage">
  <h1>💜</h1>
  <p>Enter our callsign</p>
  <input type="password" id="password" placeholder="Password">
  <button onclick="checkPassword()">Login</button>
  <p id="error" style="color:red;"></p>
</div>

<!-- LOVE LOCK -->
<div class="container hidden" id="lockPage">
  <h1 class="glow">For James Carl 💜</h1>
  <p>Click the heart 3 times</p>
  <div style="font-size:50px; cursor:pointer;" onclick="heartClick()">❤️</div>
</div>

<!-- MESSAGE -->
<div class="container hidden" id="messagePage">
  <h1>💜</h1>
  <p id="typingText"></p>

  <p>Will you stay with me forever?</p>
  <button onclick="yesLove()">💜 Yes</button>
  <button onclick="noLove()">💔 No</button>
</div>

<!-- ANNIVERSARY -->
<div class="container hidden" id="annivPage">
  <h1 class="glow">James Carl 💜</h1>
  <p><b>Marked this day as our anniversary 💜</b></p>

  <div class="slider">
    <img src="pic1.jpg">
    <img src="pic2.jpg">
    <img src="pic3.jpg">
  </div>

  <button onclick="showSecret()">Tap this 💜</button>

  <p id="secret" class="hidden">
    You are my forever, James Carl 💜🥺
  </p>

  <audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>
</div>

<script>
  let heartCount = 0;

  function checkPassword() {
    const pass = document.getElementById("password").value;

    if (pass === "love") {
      document.getElementById("loginPage").classList.add("hidden");
      document.getElementById("lockPage").classList.remove("hidden");
    } else {
      document.getElementById("error").innerText = "Wrong password 💔";
      document.body.classList.add("shake");
      setTimeout(() => document.body.classList.remove("shake"), 500);
    }
  }

  function heartClick() {
    heartCount++;
    if (heartCount >= 3) {
      document.getElementById("lockPage").classList.add("hidden");
      document.getElementById("messagePage").classList.remove("hidden");
      startTyping();
      playMusic();
    }
  }

  function playMusic() {
    const music = document.getElementById("music");
    music.volume = 0;
    music.play();

    let vol = 0;
    let fade = setInterval(() => {
      if (vol < 1) {
        vol += 0.05;
        music.volume = vol;
      } else {
        clearInterval(fade);
      }
    }, 200);
  }

  // 💌 typing effect
  const text = `James Carl,

From the moment you came into my life,
everything changed in the most beautiful way.

You are my safe place,
my happiness,
my everything.

I choose you today,
tomorrow,
and always.

I love you 💜`;

  let i = 0;

  function startTyping() {
    if (i < text.length) {
      document.getElementById("typingText").innerHTML += text.charAt(i);
      i++;
      setTimeout(startTyping, 70);
    }
  }

  function yesLove() {
    document.getElementById("messagePage").classList.add("hidden");
    document.getElementById("annivPage").classList.remove("hidden");
  }

  function noLove() {
    alert("You can't say no to love 💜");
  }

  function showSecret() {
    document.getElementById("secret").classList.remove("hidden");
  }
</script>

</body>
</html>
