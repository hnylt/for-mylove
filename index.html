<!DOCTYPE html>
<html>
<head>
  <title>For You 💜</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      color: white;
      overflow-x: hidden;
    }

    .container {
      max-width: 700px;
      margin: 60px auto;
      background: rgba(0,0,0,0.7);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h1 {
      color: #c084fc;
    }

    p {
      font-size: 16px;
      color: #ddd;
      line-height: 1.6;
    }

    input, button {
      padding: 12px;
      width: 80%;
      margin: 10px auto;
      border-radius: 10px;
      border: none;
      font-size: 14px;
    }

    input {
      background: #1e1e2f;
      color: white;
    }

    button {
      background: #7c3aed;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #a78bfa;
    }

    .hidden {
      display: none;
    }

    /* 🖼️ FIXED IMAGE GRID (NO SCROLL ISSUE) */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .gallery img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    /* 💕 Floating Hearts */
    .heart {
      position: fixed;
      color: #a78bfa;
      font-size: 20px;
      animation: floatUp 6s linear infinite;
      opacity: 0.7;
      z-index: 1;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(100vh);
        opacity: 0;
      }
      50% {
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

<!-- 💕 Floating Hearts -->
<script>
  function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💜";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    heart.style.animationDuration = (Math.random() * 4 + 4) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 6000);
  }

  setInterval(createHeart, 400);
</script>

<!-- LOGIN -->
<div class="container" id="loginPage">
  <h1>💜</h1>
  <p>Enter our callsign</p>
  <input type="password" id="password" placeholder="Enter password">
  <br>
  <button onclick="checkPassword()">Login</button>
  <p id="error" style="color:red;"></p>
</div>

<!-- READY -->
<div class="container hidden" id="readyPage">
  <h1>Hi love 💜</h1>
  <p>Are you ready?</p>
  <button onclick="showMessage()">Yes 💜</button>
</div>

<!-- MESSAGE -->
<div class="container hidden" id="messagePage">
  <h1>I have something to tell you 💜</h1>
  <p id="typingText"></p>
  <button onclick="showAnniv()">Continue 💜</button>
</div>

<!-- ANNIVERSARY -->
<div class="container hidden" id="annivPage">
  <h1>💜</h1>
  <p><b>Marked this day as our anniversary 💜</b></p>

  <div class="gallery">
    <img src="pic1.jpg">
    <img src="pic2.jpg">
    <img src="pic3.jpg">
  </div>

  <audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>
</div>

<script>
  function checkPassword() {
    var pass = document.getElementById("password").value;
    if (pass === "love") {
      document.getElementById("loginPage").classList.add("hidden");
      document.getElementById("readyPage").classList.remove("hidden");
    } else {
      document.getElementById("error").innerText = "Wrong password 💔";
    }
  }

  function showMessage() {
    document.getElementById("readyPage").classList.add("hidden");
    document.getElementById("messagePage").classList.remove("hidden");
    startTyping();
    playMusic();
  }

  function showAnniv() {
    document.getElementById("messagePage").classList.add("hidden");
    document.getElementById("annivPage").classList.remove("hidden");
  }

  function playMusic() {
    var music = document.getElementById("bgMusic");
    music.play();
  }

  // ⌨️ SLOWER TYPING EFFECT
  const text = `From the moment I met you, something felt different.
You made my world brighter without even trying.

Every moment with you is something I treasure deeply.
And I realized something important...

I love you 💜

Thank you for being part of my life.
You mean so much to me, more than words can explain.`;

  let i = 0;

  function startTyping() {
    if (i < text.length) {
      document.getElementById("typingText").innerHTML += text.charAt(i);
      i++;
      setTimeout(startTyping, 60); // slower typing here 💜
    }
  }
</script>

</body>
</html>
